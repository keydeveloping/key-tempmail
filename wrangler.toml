name = "tempik"
main = "src/index.ts"
compatibility_date = "2025-06-01"

# Set workers_dev to false when using your own domain
workers_dev = false

# ---- D1 Database ----
# Step 1: run `npx wrangler d1 create tempik-db`
# Step 2: copy the database_id here
[[d1_databases]]
binding = "DB"
database_name = "tempik-db"
database_id = ""

# ---- Email Worker ----
[email]
action = "process"

# ---- Custom domain routes ----
# CHANGE THIS to your own domain (e.g. tempik.example.com)
[[routes]]
pattern = "tempmail.pakuan.web.id"
custom_domain = true

# ---- Environment variables ----
# CHANGE THESE to your own domain
[vars]
APP_NAME = "Pakuan Mail"
MAIL_DOMAIN = "pakuan.web.id"
WEB_HOST = "tempmail.pakuan.web.id"

# ---- Retention cleanup ----
[triggers]
crons = ["17 */6 * * *"]

# ---- Static assets (web frontend) ----
[assets]
directory = "./src/web"

# ---- Observability ----
[observability]
enabled = true
